# Integration test stack: NetBox (with the plugin installed) + Keycloak.
#
#   NETBOX_IMAGE_TAG=v4.2 docker compose -f docker/docker-compose.yml up -d --build --wait
#   pytest integration_tests
#
# Supported NETBOX_IMAGE_TAG values: v4.0 … v4.6 (default v4.6).

name: netbox-keycloak-jwt-auth

services:
  postgres:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_DB: netbox
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: netbox
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -U netbox -d netbox"]
      interval: 5s
      timeout: 3s
      retries: 24

  redis:
    image: docker.io/redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 24

  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      # Fixed base URL: the token issuer must be identical no matter whether
      # the token was requested from the host (localhost:8081) or is being
      # validated inside the compose network (keycloak:8080).
      KC_HOSTNAME: http://keycloak:8080
    volumes:
      - ./keycloak/realm-infra.json:/opt/keycloak/data/import/realm-infra.json:ro
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8081}:8080"
    healthcheck:
      # The Keycloak image has no curl; bash /dev/tcp is enough to detect
      # that the HTTP listener is up (realm import happens before that).
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 20s

  netbox:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        NETBOX_IMAGE_TAG: ${NETBOX_IMAGE_TAG:-v4.6}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD: netbox
      REDIS_HOST: redis
      REDIS_DATABASE: "0"
      REDIS_CACHE_HOST: redis
      REDIS_CACHE_DATABASE: "1"
      SECRET_KEY: "e2e-only-secret-key-0123456789abcdefghijklmnopqrstuvwxyz"
      # NetBox 4.5+ stores API tokens hashed and needs at least one pepper
      # (min. 50 chars); older images simply ignore this variable.
      API_TOKEN_PEPPER_1: "e2e-only-api-token-pepper-0123456789abcdefghijklmnopqrstuvwxyz"
      LOGIN_REQUIRED: "true"
      # Superuser for the test-suite: it provisions its own native API token
      # via /api/users/tokens/provision/ (NetBox 4.5+ stores tokens hashed,
      # so a pre-seeded token key would not work there).
      SKIP_SUPERUSER: "false"
      SUPERUSER_NAME: admin
      SUPERUSER_EMAIL: admin@example.com
      SUPERUSER_PASSWORD: admin
    volumes:
      - ./netbox/plugins.py:/etc/netbox/config/plugins.py:ro
    ports:
      - "${NETBOX_HTTP_PORT:-8000}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/login/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 90
      # First boot runs migrations for NetBox itself plus the plugin.
      start_period: 120s
